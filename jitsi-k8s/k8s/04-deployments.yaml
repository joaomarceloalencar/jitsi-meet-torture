    matchLabels:
      app: jitsi-meet
      component: jicofo
  template:
    metadata:
      labels:
        app: jitsi-meet
        component: jicofo
    spec:
      containers:
      - name: jicofo
        image: jitsi/jicofo:stable-9258
        imagePullPolicy: IfNotPresent
        ports:
        - name: http
          containerPort: 8888
          protocol: TCP
        env:
        # Import common config
        - name: PUBLIC_URL
          valueFrom:
            configMapKeyRef:
              name: jitsi-common-config
              key: PUBLIC_URL
        - name: XMPP_DOMAIN
          valueFrom:
            configMapKeyRef:
              name: jitsi-common-config
              key: XMPP_DOMAIN
        - name: XMPP_AUTH_DOMAIN
          valueFrom:
            configMapKeyRef:
              name: jitsi-common-config
              key: XMPP_AUTH_DOMAIN
        - name: XMPP_MUC_DOMAIN
          valueFrom:
            configMapKeyRef:
              name: jitsi-common-config
              key: XMPP_MUC_DOMAIN
        - name: XMPP_INTERNAL_MUC_DOMAIN
          valueFrom:
            configMapKeyRef:
              name: jitsi-common-config
              key: XMPP_INTERNAL_MUC_DOMAIN
        - name: XMPP_SERVER
          valueFrom:
            configMapKeyRef:
              name: jitsi-common-config
              key: XMPP_SERVER
        - name: JVB_BREWERY_MUC
          valueFrom:
            configMapKeyRef:
              name: jitsi-common-config
              key: JVB_BREWERY_MUC
        - name: JICOFO_COMPONENT_SECRET
          valueFrom:
            configMapKeyRef:
              name: jitsi-common-config
              key: JICOFO_COMPONENT_SECRET
        - name: JICOFO_AUTH_USER
          valueFrom:
            configMapKeyRef:
              name: jitsi-common-config
              key: JICOFO_AUTH_USER
        - name: JICOFO_AUTH_PASSWORD
          valueFrom:
            secretKeyRef:
              name: jitsi-passwords
              key: JICOFO_AUTH_PASSWORD
        - name: ENABLE_AUTH
          valueFrom:
            configMapKeyRef:
              name: jitsi-common-config
              key: ENABLE_AUTH
        - name: AUTH_TYPE
          valueFrom:
            configMapKeyRef:
              name: jitsi-common-config
              key: AUTH_TYPE
        - name: TZ
          valueFrom:
            configMapKeyRef:
              name: jitsi-common-config
              key: TZ
        # Import jicofo-specific config
        - name: JICOFO_ENABLE_AUTH
          valueFrom:
            configMapKeyRef:
              name: jitsi-jicofo-config
              key: JICOFO_ENABLE_AUTH
        - name: JICOFO_ENABLE_BRIDGE_HEALTH_CHECKS
          valueFrom:
            configMapKeyRef:
              name: jitsi-jicofo-config
              key: JICOFO_ENABLE_BRIDGE_HEALTH_CHECKS
        - name: JICOFO_MAX_MEMORY
          valueFrom:
            configMapKeyRef:
              name: jitsi-jicofo-config
              key: JICOFO_MAX_MEMORY
        resources:
          requests:
            memory: "512Mi"
            cpu: "300m"
          limits:
            memory: "1Gi"
            cpu: "800m"
        livenessProbe:
          tcpSocket:
            port: 8888
          initialDelaySeconds: 60
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          tcpSocket:
            port: 8888
          initialDelaySeconds: 30
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3

---
# JVB (Videobridge) Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: jvb
  namespace: jitsi
  labels:
    app: jitsi-meet
    component: jvb
spec:
  replicas: 2
  selector:
    matchLabels:
      app: jitsi-meet
      component: jvb
  template:
    metadata:
      labels:
        app: jitsi-meet
        component: jvb
    spec:
      containers:
      - name: jvb
        image: jitsi/jvb:stable-9258
        imagePullPolicy: IfNotPresent
        ports:
        - name: rtp-udp
          containerPort: 10000
          protocol: UDP
        - name: colibri
          containerPort: 8080
          protocol: TCP
        env:
        # Import common config
        - name: PUBLIC_URL
          valueFrom:
            configMapKeyRef:
              name: jitsi-common-config
              key: PUBLIC_URL
        - name: XMPP_DOMAIN
          valueFrom:
            configMapKeyRef:
              name: jitsi-common-config
              key: XMPP_DOMAIN
        - name: XMPP_AUTH_DOMAIN
          valueFrom:
            configMapKeyRef:
              name: jitsi-common-config
              key: XMPP_AUTH_DOMAIN
        - name: XMPP_INTERNAL_MUC_DOMAIN
          valueFrom:
            configMapKeyRef:
              name: jitsi-common-config
              key: XMPP_INTERNAL_MUC_DOMAIN
        - name: XMPP_SERVER
          valueFrom:
            configMapKeyRef:
              name: jitsi-common-config
              key: XMPP_SERVER
        - name: JVB_BREWERY_MUC
          valueFrom:
            configMapKeyRef:
              name: jitsi-common-config
              key: JVB_BREWERY_MUC
        - name: JVB_AUTH_USER
          valueFrom:
            configMapKeyRef:
              name: jitsi-common-config
              key: JVB_AUTH_USER
        - name: JVB_AUTH_PASSWORD
          valueFrom:
            secretKeyRef:
              name: jitsi-passwords
              key: JVB_AUTH_PASSWORD
        - name: TZ
          valueFrom:
            configMapKeyRef:
              name: jitsi-common-config
              key: TZ
        # Import JVB-specific config
        - name: JVB_ENABLE_APIS
          valueFrom:
            configMapKeyRef:
              name: jitsi-jvb-config
              key: JVB_ENABLE_APIS
        - name: JVB_PORT
          valueFrom:
            configMapKeyRef:
              name: jitsi-jvb-config
              key: JVB_PORT
        - name: JVB_TCP_HARVESTER_DISABLED
          valueFrom:
            configMapKeyRef:
              name: jitsi-jvb-config
              key: JVB_TCP_HARVESTER_DISABLED
        - name: JVB_STUN_SERVERS
          valueFrom:
            configMapKeyRef:
              name: jitsi-jvb-config
              key: JVB_STUN_SERVERS
        - name: JVB_MAX_MEMORY
          valueFrom:
            configMapKeyRef:
              name: jitsi-jvb-config
              key: JVB_MAX_MEMORY
        - name: COLIBRI_WEBSOCKET_ENABLED
          valueFrom:
            configMapKeyRef:
              name: jitsi-jvb-config
              key: COLIBRI_WEBSOCKET_ENABLED
        resources:
          requests:
            memory: "1Gi"
            cpu: "500m"
          limits:
            memory: "2Gi"
            cpu: "1500m"
        livenessProbe:
          httpGet:
            path: /about/health
            port: 8080
          initialDelaySeconds: 60
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /about/health
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
